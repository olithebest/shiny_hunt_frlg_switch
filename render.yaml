services:
  - type: web
    name: shiny-hunter-webhook
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements-webhook.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: RESEND_API_KEY
        sync: false        # set manually in Render dashboard
      - key: FROM_EMAIL
        sync: false        # e.g. onboarding@resend.dev or your verified domain
      - key: SHINY_HUNTER_SECRET
        sync: false
